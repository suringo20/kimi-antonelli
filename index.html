<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kimi Antonelli · F1's Next Generation</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #00D2BE; --dark: #0d0d0d; --darker: #080808;
      --surface: #161616; --surface2: #1e1e1e; --border: #2a2a2a;
      --text: #f0f0f0; --muted: #888; --red: #e8002d;
      --font: 'Inter', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--darker); color: var(--text); line-height: 1.6; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: var(--font); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--darker); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
    .section { padding: 5rem 0; }
    .tag { display: inline-block; padding: .25rem .75rem; border-radius: 999px; font-size: .75rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
    .tag--accent { background: var(--accent); color: var(--dark); }
    .tag--red { background: var(--red); color: #fff; }
    .tag--muted { background: var(--surface2); color: var(--muted); }
    .btn { display: inline-flex; align-items: center; gap: .5rem; padding: .75rem 1.75rem; border-radius: 4px; font-size: .9rem; font-weight: 600; letter-spacing: .03em; transition: all .2s; border: none; }
    .btn--primary { background: var(--accent); color: var(--dark); }
    .btn--primary:hover { background: #00b8a8; transform: translateY(-1px); }
    .btn--outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn--outline:hover { border-color: var(--accent); color: var(--accent); }
    .page-title { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; letter-spacing: -.02em; line-height: 1.1; }
    .section-label { font-size: .75rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--accent); margin-bottom: .75rem; }
    .divider { border: none; border-top: 1px solid var(--border); }
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .app__main { flex: 1; }
    .page-header { padding: 4rem 0 3rem; border-bottom: 1px solid var(--border); }
    .page-header__sub { color: var(--muted); margin-top: .5rem; font-size: .95rem; }

    /* HEADER */
    .header { position: sticky; top: 0; z-index: 100; background: rgba(8,8,8,.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .header__inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .header__logo { display: flex; align-items: center; gap: .5rem; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
    .header__logo-num { background: var(--accent); color: var(--dark); width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: .85rem; font-weight: 900; }
    .header__nav { display: flex; align-items: center; gap: .25rem; }
    .header__link { padding: .4rem .85rem; border-radius: 4px; font-size: .875rem; font-weight: 500; color: var(--muted); transition: color .15s, background .15s; cursor: pointer; border: none; background: none; }
    .header__link:hover { color: var(--text); background: var(--surface); }
    .header__link--active { color: var(--accent) !important; }
    .header__burger { display: none; flex-direction: column; gap: 5px; background: none; border: none; padding: 6px; }
    .header__burger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; }
    @media (max-width:700px) {
      .header__burger { display: flex; }
      .header__nav { display: none; position: absolute; top: 64px; left: 0; right: 0; flex-direction: column; background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem; gap: .25rem; }
      .header__nav--open { display: flex; }
      .header__link { width: 100%; padding: .75rem 1rem; font-size: 1rem; text-align: left; }
    }

    /* FOOTER */
    .footer { background: var(--surface); border-top: 1px solid var(--border); padding: 3rem 0 1.5rem; }
    .footer__inner { display: grid; grid-template-columns: 1fr auto auto; gap: 2rem; align-items: start; margin-bottom: 2rem; }
    .footer__brand { display: flex; flex-direction: column; gap: .4rem; }
    .footer__num { display: inline-flex; align-items: center; justify-content: center; background: var(--accent); color: var(--dark); width: 28px; height: 28px; border-radius: 4px; font-size: .8rem; font-weight: 900; }
    .footer__name { font-weight: 700; font-size: 1rem; }
    .footer__disclaimer { font-size: .75rem; color: var(--muted); max-width: 280px; line-height: 1.5; }
    .footer__links { display: flex; flex-direction: column; gap: .5rem; }
    .footer__links button { background: none; border: none; font-size: .875rem; color: var(--muted); transition: color .15s; cursor: pointer; text-align: left; padding: 0; }
    .footer__links button:hover { color: var(--text); }
    .footer__social { display: flex; gap: .75rem; }
    .footer__social a { width: 36px; height: 36px; border-radius: 4px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; color: var(--muted); transition: all .15s; }
    .footer__social a:hover { border-color: var(--accent); color: var(--accent); }
    .footer__copy { text-align: center; font-size: .75rem; color: var(--muted); border-top: 1px solid var(--border); padding-top: 1.5rem; }
    @media (max-width:700px) { .footer__inner { grid-template-columns: 1fr; } }

    /* HOME */
    .hero { position: relative; min-height: 90vh; display: flex; align-items: center; overflow: hidden; }
    .hero__bg { position: absolute; inset: 0; z-index: 0; }
    .hero__gradient { position: absolute; inset: 0; background: radial-gradient(ellipse at 70% 50%, rgba(0,210,190,.12) 0%, transparent 60%), linear-gradient(135deg,#0d0d0d 0%,#080808 100%); }
    .hero__grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px), linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px); background-size: 60px 60px; }
    .hero__content { position: relative; z-index: 1; padding-top: 5rem; padding-bottom: 5rem; }
    .hero__tag { margin-bottom: 1.5rem; }
    .hero__title { font-size: clamp(4rem,12vw,9rem); font-weight: 900; letter-spacing: -.04em; line-height: .95; margin-bottom: 1rem; }
    .hero__title-accent { color: var(--accent); }
    .hero__sub { font-size: 1.1rem; color: var(--muted); margin-bottom: 2rem; letter-spacing: .05em; }
    .hero__result { display: inline-flex; align-items: center; gap: .75rem; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: .6rem 1.25rem; border-radius: 4px; margin-bottom: 2.5rem; font-size: .875rem; }
    .hero__result-label { color: var(--muted); }
    .hero__result-val { font-weight: 700; }
    .hero__ctas { display: flex; gap: 1rem; flex-wrap: wrap; }
    .hero__number { position: absolute; right: -2rem; top: 50%; transform: translateY(-50%); font-size: clamp(12rem,25vw,22rem); font-weight: 900; color: rgba(255,255,255,.025); letter-spacing: -.05em; pointer-events: none; user-select: none; line-height: 1; }
    .hero__photo { position: absolute; right: 0; bottom: 0; top: 0; width: 45%; object-fit: cover; object-position: center center; mask-image: linear-gradient(to left, rgba(0,0,0,.7) 60%, transparent 100%); -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,.7) 60%, transparent 100%); pointer-events: none; }
    @media (max-width: 900px) { .hero__photo { width: 55%; opacity: .35; } }
    @media (max-width: 600px) { .hero__photo { display: none; } }
    .stats-bar { background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 2rem 0; }
    .stats-bar__inner { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1.5rem; }
    .stats-bar__item { display: flex; flex-direction: column; align-items: center; gap: .25rem; }
    .stats-bar__val { font-size: 2rem; font-weight: 900; color: var(--accent); line-height: 1; }
    .stats-bar__label { font-size: .7rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
    .home__cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
    .home__card { display: flex; flex-direction: column; gap: .75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 2rem; transition: all .2s; position: relative; overflow: hidden; cursor: pointer; border-top: 3px solid transparent; }
    .home__card--about { border-top-color: var(--accent); }
    .home__card--career { border-top-color: #ffd700; }
    .home__card--media { border-top-color: var(--red); }
    .home__card:hover { border-bottom-color: #444; border-left-color: #444; border-right-color: #444; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.4); }
    .home__card-title { font-size: 1.3rem; font-weight: 800; line-height: 1.2; }
    .home__card-text { font-size: .875rem; color: var(--muted); line-height: 1.6; flex: 1; }
    .home__card-arrow { font-size: 1.2rem; color: var(--accent); transition: transform .2s; }
    .home__card:hover .home__card-arrow { transform: translateX(4px); }
    .home__news-teaser { background: var(--surface); }
    .home__news-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .home__news-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1.5rem; }
    .home__news-card { display: flex; flex-direction: column; gap: .75rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; transition: all .2s; cursor: pointer; }
    .home__news-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .home__news-title { font-size: 1.05rem; font-weight: 700; line-height: 1.4; }
    .home__news-date { font-size: .75rem; color: var(--muted); margin-top: auto; }
    @media (max-width:900px) { .home__cards { grid-template-columns: 1fr; } .home__news-grid { grid-template-columns: 1fr; } }

    /* ABOUT */
    .about__bio-grid { display: grid; grid-template-columns: 300px 1fr; gap: 4rem; align-items: start; }
    .about__portrait-placeholder { width: 100%; aspect-ratio: 3/4; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .about__portrait-placeholder img { width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block; }
    .about__portrait-num { font-size: 6rem; font-weight: 900; color: var(--border); }
    .about__quote { margin-top: 1.5rem; border-left: 3px solid var(--accent); padding-left: 1rem; font-style: italic; color: var(--muted); font-size: .9rem; line-height: 1.6; }
    .about__quote cite { display: block; font-size: .8rem; margin-top: .5rem; font-style: normal; color: var(--accent); }
    .about__para { color: var(--muted); line-height: 1.8; margin-bottom: 1.25rem; font-size: .95rem; }
    .about__meta { display: grid; grid-template-columns: repeat(2,1fr); gap: .75rem; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border); }
    .about__meta-item { display: flex; flex-direction: column; gap: .2rem; }
    .about__meta-label { font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .about__meta-val { font-size: .95rem; font-weight: 600; }
    .about__style { background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .about__traits { display: flex; gap: 1rem; flex-wrap: wrap; }
    .about__trait { display: flex; align-items: center; gap: .5rem; background: var(--surface2); border: 1px solid var(--border); padding: .75rem 1.25rem; border-radius: 4px; font-weight: 600; font-size: .9rem; }
    .about__trait-icon { color: var(--accent); font-size: .6rem; }
    .about__timeline { display: flex; flex-direction: column; }
    .about__timeline-item { display: grid; grid-template-columns: 80px 40px 1fr; align-items: start; }
    .about__timeline-year { font-size: .8rem; font-weight: 700; color: var(--accent); padding-top: 2px; text-align: right; padding-right: 1rem; }
    .about__timeline-line { display: flex; flex-direction: column; align-items: center; }
    .about__timeline-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); margin-top: 4px; flex-shrink: 0; }
    .about__timeline-track { width: 2px; flex: 1; min-height: 40px; background: var(--border); }
    .about__timeline-event { padding: 0 0 2rem 1rem; font-size: .95rem; color: var(--muted); line-height: 1.5; }
    .about__cta { background: var(--surface); border-top: 1px solid var(--border); text-align: center; }

    /* CAREER */
    .career__summary { background: var(--surface); border-bottom: 1px solid var(--border); padding: 2.5rem 0; }
    .career__summary-grid { display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: space-between; }
    .career__stat { display: flex; flex-direction: column; align-items: center; gap: .25rem; }
    .career__stat-val { font-size: 2.2rem; font-weight: 900; color: var(--accent); line-height: 1; }
    .career__stat-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .career__table-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .career__sort { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
    .career__sort-label { font-size: .75rem; color: var(--muted); font-weight: 600; }
    .career__sort-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: .3rem .75rem; border-radius: 4px; font-size: .8rem; font-weight: 600; transition: all .15s; }
    .career__sort-btn:hover { color: var(--text); border-color: #444; }
    .career__sort-btn--active { background: var(--accent); color: var(--dark); border-color: var(--accent); }
    .career__table-wrap { overflow-x: auto; }
    .career__table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    .career__table th { text-align: left; font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); padding: .75rem 1rem; border-bottom: 1px solid var(--border); }
    .career__row { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
    .career__row:hover { background: var(--surface); }
    .career__row--selected { background: rgba(0,210,190,.06) !important; }
    .career__row td { padding: 1rem; vertical-align: middle; }
    .career__gp { display: flex; flex-direction: column; gap: .2rem; }
    .career__gp-name { font-weight: 600; }
    .career__gp-circuit { font-size: .75rem; color: var(--muted); }
    .career__pos { font-weight: 700; font-size: 1rem; }
    .career__pts { font-weight: 600; color: var(--accent); }
    .career__modal { margin-top: 1.5rem; background: var(--surface); border: 1px solid var(--accent); border-radius: 8px; padding: 2rem; position: relative; animation: fadeIn .15s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
    .career__modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; }
    .career__modal-stats { display: grid; grid-template-columns: repeat(auto-fill,minmax(140px,1fr)); gap: 1rem; }
    .career__modal-stats div { display: flex; flex-direction: column; gap: .2rem; }
    .career__modal-stats span { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .career__modal-stats strong { font-size: 1.1rem; font-weight: 800; }

    /* MEDIA */
    .media__filters { display: flex; gap: .5rem; padding-top: 2rem; }
    .media__filter { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: .5rem 1.25rem; border-radius: 999px; font-size: .875rem; font-weight: 600; transition: all .15s; }
    .media__filter:hover { color: var(--text); border-color: #444; }
    .media__filter--active { background: var(--accent); color: var(--dark); border-color: var(--accent); }
    .media__featured { border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); transition: border-color .2s; }
    .media__featured:hover { border-color: var(--accent); }
    .media__featured-bg { height: 320px; background: linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%); display: flex; align-items: center; justify-content: center; position: relative; }
    .media__play-btn { width: 72px; height: 72px; border-radius: 50%; background: rgba(0,210,190,.9); color: var(--dark); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: transform .2s; }
    .media__featured:hover .media__play-btn { transform: scale(1.1); }
    .media__playing-indicator { position: absolute; bottom: 1rem; left: 1rem; font-size: .75rem; font-weight: 600; color: var(--accent); letter-spacing: .05em; }
    .media__featured-info { padding: 1.25rem 1.5rem; background: var(--surface); display: flex; align-items: center; gap: 1rem; }
    .media__featured-title { font-size: 1rem; font-weight: 700; flex: 1; }
    .media__featured-duration { font-size: .8rem; color: var(--muted); flex-shrink: 0; }
    .media__grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 1.5rem; }
    .media__card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: all .2s; }
    .media__card:hover { border-color: #444; transform: translateY(-2px); }
    .media__card--playing { border-color: var(--accent); }
    .media__thumb { height: 160px; background: linear-gradient(135deg,#1a1a2e 0%,#16213e 100%); display: flex; align-items: center; justify-content: center; position: relative; }
    .media__thumb-play { width: 48px; height: 48px; border-radius: 50%; background: rgba(0,210,190,.85); color: var(--dark); display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .media__type { position: absolute; bottom: .5rem; left: .5rem; font-size: .65rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: #000; padding: .2rem .5rem; border-radius: 3px; }
    .media__card-info { padding: 1rem; }
    .media__card-title { font-size: .9rem; font-weight: 600; line-height: 1.4; margin-bottom: .5rem; }
    .media__card-meta { display: flex; align-items: center; justify-content: space-between; font-size: .75rem; color: var(--muted); }
    .media__share { background: none; border: none; color: var(--accent); font-size: .75rem; font-weight: 600; cursor: pointer; }
    .media__photos { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 1rem; }
    .media__photo { display: flex; flex-direction: column; gap: .5rem; }
    .media__photo-placeholder { aspect-ratio: 4/3; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: border-color .15s; }
    .media__photo-placeholder:hover { border-color: var(--accent); }
    .media__photo-num { font-size: 2rem; font-weight: 900; color: var(--border); }
    .media__photo-label { font-size: .75rem; color: var(--muted); }

    /* NEWS */
    .news__subscribe { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.25rem 0; }
    .news__subscribe-inner { display: flex; align-items: center; justify-content: space-between; gap: 1.5rem; flex-wrap: wrap; }
    .news__subscribe-text { font-size: .9rem; font-weight: 600; }
    .news__subscribe-form { display: flex; gap: .75rem; flex-wrap: wrap; }
    .news__subscribe-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: .65rem 1rem; border-radius: 4px; font-size: .875rem; font-family: var(--font); min-width: 220px; outline: none; transition: border-color .15s; }
    .news__subscribe-input:focus { border-color: var(--accent); }
    .news__subscribe-success { color: var(--accent); font-weight: 600; font-size: .9rem; }
    .news__grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(320px,1fr)); gap: 1.5rem; align-items: start; }
    .news__card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.75rem; display: flex; flex-direction: column; gap: .75rem; transition: all .2s; }
    .news__card:hover { border-color: #444; transform: translateY(-1px); }
    .news__card--featured { grid-column: 1 / -1; border-left: 4px solid var(--accent); }
    .news__card-tags { display: flex; gap: .5rem; flex-wrap: wrap; }
    .news__card-title { font-size: 1.1rem; font-weight: 700; line-height: 1.4; }
    .news__card--featured .news__card-title { font-size: 1.35rem; }
    .news__card-excerpt { font-size: .875rem; color: var(--muted); line-height: 1.7; flex: 1; }
    .news__card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: .25rem; }
    .news__card-date { font-size: .75rem; color: var(--muted); }
    .news__read-more { background: none; border: none; color: var(--accent); font-size: .8rem; font-weight: 600; cursor: pointer; }
    @media (max-width:700px) { .news__card--featured { grid-column: 1; } }

    /* FAN ZONE */
    .fanzone__trivia { display: flex; align-items: center; gap: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 2.5rem; }
    .fanzone__trivia-nav { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 44px; height: 44px; border-radius: 50%; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
    .fanzone__trivia-nav:hover { border-color: var(--accent); color: var(--accent); }
    .fanzone__trivia-content { flex: 1; text-align: center; }

            </div>
          </section>

          <section className="section" style={{paddingTop:0}}>
            <div className="container">
              <hr className="divider" style={{marginBottom:'2rem'}}/>
              <p style={{color:'var(--muted)',marginBottom:'1rem'}}>Want to see him in action?</p>
              <button className="btn btn--primary" onClick={() => go('media')}>Watch his highlights →</button>
            </div>
          </section>
        </div>
      );
    }

    // ── MEDIA ─────────────────────────────────────────────────────────────────
    function Media() {
      const [filter, setFilter] = useState('All');
      const [playing, setPlaying] = useState(null);
      const showVideos = filter==='All'||filter==='Videos';
      const showPhotos = filter==='All'||filter==='Photos';
      return (
        <div>
          <section className="page-header">
            <div className="container"><p className="section-label">Gallery</p><h1 className="page-title">Media</h1></div>
          </section>
          <div className="media__filters container">
            {['All','Videos','Photos'].map(f => (
              <button key={f} onClick={() => setFilter(f)} className={`media__filter${filter===f?' media__filter--active':''}`}>{f}</button>
            ))}
          </div>
          {showVideos && (
            <section className="section" style={{paddingTop:'2rem'}}>
              <div className="container">
                <p className="section-label">Featured</p>
                <div className="media__featured" onClick={() => setPlaying(playing==='featured'?null:'featured')}>
                  <div className="media__featured-bg">
                    <div className="media__play-btn">{playing==='featured'?'⏸':'▶'}</div>
                    {playing==='featured'&&<div className="media__playing-indicator">Now playing</div>}
                  </div>
                  <div className="media__featured-info">
                    <span className="tag tag--accent">Highlights</span>
                    <h2 className="media__featured-title">Best Overtakes — 2025 Season So Far</h2>
                    <p className="media__featured-duration">4:32</p>
                  </div>
                </div>
              </div>
            </section>
          )}
          {showVideos && (
            <section className="section" style={{paddingTop:0}}>
              <div className="container">
                <p className="section-label">Videos</p>
                <div className="media__grid">
                  {mediaVideos.slice(1).map(video => (
                    <div key={video.id} className={`media__card${playing===video.id?' media__card--playing':''}`} onClick={() => setPlaying(playing===video.id?null:video.id)}>
                      <div className="media__thumb">
                        <div className="media__thumb-play">{playing===video.id?'⏸':'▶'}</div>
                        <span className="media__type" style={{background:typeColors[video.type]}}>{video.type}</span>
                      </div>
                      <div className="media__card-info">
                        <h3 className="media__card-title">{video.title}</h3>
                        <div className="media__card-meta">
                          <span>{video.duration}</span>
                          <button className="media__share" onClick={e=>{e.stopPropagation();alert('Share link copied!');}}>Share ↗</button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          )}
          {showPhotos && (
            <section className="section" style={{paddingTop:filter==='All'?0:'2rem'}}>
              <div className="container">
                <p className="section-label">Photos</p>
                <div className="media__photos">
                  {photos.map(photo => (
                    <div key={photo.id} className="media__photo">
                      <div className="media__photo-placeholder"><span className="media__photo-num">#{photo.id}</span></div>
                      <p className="media__photo-label">{photo.label}</p>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          )}
        </div>
      );
    }

    // ── NEWS ──────────────────────────────────────────────────────────────────
    function News() {
      const [subscribed, setSubscribed] = useState(false);
      const [email, setEmail] = useState('');
      return (
        <div>
          <section className="page-header">
            <div className="container"><p className="section-label">Latest</p><h1 className="page-title">News & Updates</h1></div>
          </section>
          <div className="news__subscribe">
            <div className="container news__subscribe-inner">
              {subscribed
                ? <p className="news__subscribe-success">✓ You're in! We'll notify you before the next race.</p>
                : <>
                    <p className="news__subscribe-text">Get updates before the next race</p>
                    <form className="news__subscribe-form" onSubmit={e=>{e.preventDefault();if(email.trim())setSubscribed(true);}}>
                      <input type="email" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)} className="news__subscribe-input" required/>
                      <button type="submit" className="btn btn--primary">Subscribe</button>
                    </form>
                  </>
              }
            </div>
          </div>
          <section className="section">
            <div className="container news__grid">
              {newsArticles.map((article,i) => (
                <article key={article.id} className={`news__card${i===0?' news__card--featured':''}`}>
                  <div className="news__card-tags">
                    <span className={`tag ${article.breaking?'tag--red':'tag--muted'}`}>{article.tag}</span>
                    {article.breaking&&<span className="tag tag--red">Breaking</span>}
                  </div>
                  <h2 className="news__card-title">{article.title}</h2>
                  <p className="news__card-excerpt">{article.excerpt}</p>
                  <div className="news__card-footer">
                    <span className="news__card-date">{article.date}</span>
                    <button className="news__read-more">Read more →</button>
                  </div>
                </article>
              ))}
            </div>
          </section>
        </div>
      );
    }

    // ── FAN ZONE ──────────────────────────────────────────────────────────────
    function FanZone() {
      const [triviaIdx, setTriviaIdx] = useState(0);
      const [voted, setVoted] = useState(null);
      const [votes, setVotes] = useState(pollOptions.reduce((acc,o)=>({...acc,[o.id]:o.votes}),{}));
      const totalVotes = Object.values(votes).reduce((a,b)=>a+b,0);
      const handleVote = id => { if(voted)return; setVoted(id); setVotes(v=>({...v,[id]:v[id]+1})); };
      const socialPosts = [
        {handle:'@f1fanatic',     text:'Antonelli in the rain at Monaco was something else 😤 #Kimi12'},
        {handle:'@mercedesgirl',  text:'The way he set that lap time in Q3 just casually... this kid is special ⚡'},
        {handle:'@formula1italy', text:'Italia ha un nuovo eroe! 🇮🇹 #Antonelli #F1'},
        {handle:'@paddockwatch',  text:'P3 on debut year and getting better every race. The future is now.'},
      ];
      return (
        <div>
          <section className="page-header">
            <div className="container"><p className="section-label">For the fans</p><h1 className="page-title">Fan Zone</h1></div>
          </section>

          <section className="section">
            <div className="container">
              <p className="section-label">Did You Know?</p>
              <div className="fanzone__trivia">
                <button className="fanzone__trivia-nav" onClick={()=>setTriviaIdx(i=>(i-1+trivia.length)%trivia.length)}>‹</button>
                <div className="fanzone__trivia-content">
                  <p className="fanzone__trivia-text">"{trivia[triviaIdx]}"</p>
                  <span className="fanzone__trivia-count">{triviaIdx+1} / {trivia.length}</span>
                </div>
                <button className="fanzone__trivia-nav" onClick={()=>setTriviaIdx(i=>(i+1)%trivia.length)}>›</button>
              </div>
            </div>
          </section>

          <section className="section fanzone__poll-section">
            <div className="container">
              <p className="section-label">Fan Poll</p>
              <h2 style={{fontSize:'1.5rem',fontWeight:800,marginBottom:'.5rem'}}>What's your favourite Antonelli moment so far?</h2>
              {voted&&<p className="fanzone__voted-msg">Thanks for voting! {totalVotes.toLocaleString()} total votes.</p>}
              <div className="fanzone__poll">
                {pollOptions.map(option => {
                  const pct = Math.round((votes[option.id]/(totalVotes||1))*100);
                  return (
                    <button key={option.id}
                      className={`fanzone__poll-option${voted===option.id?' fanzone__poll-option--winner':''}${voted&&voted!==option.id?' fanzone__poll-option--faded':''}`}
                      onClick={()=>handleVote(option.id)} disabled={!!voted}>
                      <div className="fanzone__poll-bar" style={{width:voted?`${pct}%`:'0%'}}/>
                      <div className="fanzone__poll-row">
                        <span className="fanzone__poll-label">{option.label}</span>
                        {voted&&<span className="fanzone__poll-pct">{pct}%</span>}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          </section>

          <section className="section">
            <div className="container">
              <p className="section-label">Fan Reactions</p>
              <h2 style={{fontSize:'1.5rem',fontWeight:800,marginBottom:'1.5rem'}}>#Kimi12 on social</h2>
              <div className="fanzone__social">
                {socialPosts.map(post => (
                  <div key={post.handle} className="fanzone__post">
                    <div className="fanzone__post-avatar">{post.handle[1].toUpperCase()}</div>
                    <div><p className="fanzone__post-handle">{post.handle}</p><p className="fanzone__post-text">{post.text}</p></div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section className="fanzone__merch">
            <div className="container fanzone__merch-inner">
              <div>
                <p className="section-label">Official Store</p>
                <h2 style={{fontSize:'1.5rem',fontWeight:800}}>Rep the #12</h2>
                <p style={{color:'var(--muted)',marginTop:'.5rem'}}>Official Mercedes-AMG Petronas merch — caps, tees, and more.</p>
              </div>
              <a href="https://www.mercedesamgf1.com/en/shop" target="_blank" rel="noopener noreferrer" className="btn btn--primary">Shop now →</a>
            </div>
          </section>
        </div>
      );
    }

    // ── APP ───────────────────────────────────────────────────────────────────
    const pages = { home:Home, about:About, career:Career, media:Media, news:News, fan:FanZone };

    function App() {
      const [page, setPage] = useState('home');
      const Page = pages[page] || Home;
      return (
        <NavCtx.Provider value={{ page, navigate: setPage }}>
          <div className="app">
            <Header/>
            <main className="app__main"><Page/></main>
            <Footer/>
          </div>
        </NavCtx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
